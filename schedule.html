<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>График работы</title>

  <style>
body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: Arial, sans-serif;

  background:
    url('https://www.transparenttextures.com/patterns/cubes.png'),
    linear-gradient(360deg, #4d4e4f, #d9e3e3);

  background-repeat: repeat;
}
.box {
  background: white;
  padding: 25px;
  border-radius: 15px;

  width: 90%;
  max-width: 350px;

  box-shadow: 0 0 15px rgba(0,0,0,0.1);
  border: 2px solid #ddd;
  text-align: left;
}

    .title {
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 18px;
      text-align: center;
    }

    .day {
      margin: 8px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="title">🕒 График работы</div>

    <div class="day">Понедельник: 09:00 – 18:00</div>
    <div class="day">Вторник: 09:00 – 18:00</div>
    <div class="day">Среда: 09:00 – 18:00</div>
    <div class="day">Четверг: 09:00 – 18:00</div>
    <div class="day">Пятница: 09:00 – 18:00</div>
    <div class="day">Суббота: 10:00 – 15:00</div>
    <div class="day">Воскресенье: Выходной</div>

  </div>

</body>
</html>
