<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Социальные сети</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    background: url('https://www.transparenttextures.com/patterns/cubes.png'),
              linear-gradient(360deg, #4d4e4f, #d9e3e3); 
    }

    h1 {
      margin-bottom: 20px;
    }

    /* РАМКА */
    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 350px;
      margin: 0 auto 30px auto;
      box-shadow: 0 0 15px rgba(40, 8, 8, 0.1);
      border: 2px solid #d88b8b;
    }

    .contacts {
      font-size: 16px;
      line-height: 1.8;
      text-align: left;
    }

    .social-icons i {
      font-size: 60px;
      margin: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .social-icons i:hover {
      transform: scale(1.2);
    }

    .instagram { color: #e1306c; }
    .twitter { color: #1da1f2; }
    .facebook { color: #1877f2; }
    .whatsapp { color: #25d366; }
  </style>
</head>

<body>

  <h1>Наши контакты и соцсети</h1>

  <!-- РАМКА -->
  <div class="box">
    <div class="contacts">
      📞 Телефон: +996 999 766 792<br>
      📧 Email: azima@gmail.com<br>
      📍 Город: Ош<br>
      🏠 Адрес: ул. Исанова 81
    </div>
  </div>

  <!-- СОЦСЕТИ -->
  <div class="social-icons">
    <i class="fa-brands fa-square-instagram instagram"></i>
    <i class="fa-brands fa-square-x-twitter twitter"></i>
    <i class="fa-brands fa-square-facebook facebook"></i>
    <i class="fa-brands fa-square-whatsapp whatsapp"></i>
  </div>

</body>
</html>
