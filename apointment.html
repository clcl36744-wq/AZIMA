<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    

<style>
  body {
    font-family: Arial, sans-serif;
    /* background-color: #82d0e4; */
    background-image: url(jihadsabila-background-7113334_1920.png);
    /* display: flex; */
    /* justify-content: center; */
    align-items: center;
    padding-left: 385px;
  }

  form {
    background: #be9595;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 450px;
    width: 100%;
    align-items: center;

  }

  label {
    font-weight: bold;
    margin-bottom: 5px;
    display: block;
    color: #333;
  }

  select, input[type="date"], input[type="time"] {
    width: 100%;
    padding: 10px 12px;
    margin: 8px 0 20px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    transition: border-color 0.3s;
  }

  select:focus, input[type="date"]:focus, input[type="time"]:focus {
    border-color: #007BFF;
    outline: none;
  }

  button {
    background-color: #007BFF;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
    width: 100%;
  }

  button:hover {
    background-color: #0056b3;
  }

  optgroup {
    font-weight: bold;
    color: #555;
  }

  option {
    padding: 5px 10px;
  }
  h3{
  
    color: #f8f5f5;
  }
  h2{
    
    color: azure;
  }
  /* !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! */
 .wrapper{
  /* position: fixed; */
  /* top: 50%; */
  /* left: 50%; */
  transform: translate(-50%, -50%);
  margin-left: 250px;
  margin-top: 20px;
  color: #fff;
  font: bold;
}

a{
  display: block;
  width: 200px;
  height: 40px;
  line-height: 40px;
  font-size: 20px;
  font-family: sans-serif;
  text-decoration: none;
  color: #ece3e3;
  border: 2px solid #333;
  letter-spacing: 2px;
  text-align: center;
  position: relative;
  transition: all .35s;
}

a span{
  position: relative;
  z-index: 2;
}

a:after{
  position: absolute;
  content: "";
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  background: #29d916;
  transition: all .35s;
 
}

a:hover{
  color: #121212;
}

a:hover:after{
  width: 100%;
}
</style>
</head>
<body>
  
  <h2>Медицинский центр "Здоровье"</h2>
  <h3>Чтобы записаться, пожалуйста, заполните форму.</h3>
    <form action="/submit" method="post">
  <label for="department">Выберите отдел:</label>
  <select id="department" name="department" required>
    <optgroup label="Хирургические отделы">
      <option value="general_surgery">Общая хирургия</option>
      <option value="orthopedics">Ортопедия и травматология</option>
      <option value="neurosurgery">Нейрохирургия</option>
      <option value="thoracic_surgery">Торакальная хирургия</option>
    </optgroup>
    <optgroup label="Инфекционные и вирусные отделы">
      <option value="infectious">Инфекционное отделение</option>
      <option value="virology_hepatology">Вирусологическое/гепатологическое отделение</option>
    </optgroup>
    <optgroup label="Специализированные отделения">
      <option value="gynecology">Гинекология и акушерство</option>
      <option value="pediatrics">Педиатрия</option>
      <option value="oncology">Онкология</option>
      <option value="endocrinology">Эндокринология</option>
      <option value="gastroenterology">Гастроэнтерология</option>
      <option value="nephrology">Нефрология</option>
      <option value="pulmonology">Пульмонология</option>
      <option value="dermatology">Дерматология</option>
      <option value="ophthalmology">Офтальмология</option>
      <option value="ent">Отоларингология (ЛОР)</option>
    </optgroup>
    <optgroup label="Экстренные отделения">
      <option value="emergency">Скорая помощь / приемное отделение</option>
      <option value="icu">Реанимация (ICU)</option>
    </optgroup>
    <optgroup label="Диагностические и вспомогательные">
      <option value="imaging">Рентген / МРТ / УЗИ</option>
      <option value="laboratory">Лаборатория</option>
      <option value="physiotherapy">Физиотерапия и ЛФК</option>
    </optgroup>
  </select>

  <br><br>

  <label for="date">Выберите дату:</label>
  <input type="date" id="date" name="date" required>

  <br><br>

  <label for="time">Выберите время:</label>
  <input type="time" id="time" name="time" required>

  <br><br>

  <div class="left"></div>
    Hover me!
  <div class="right"></div>
</button> -->

<div class="wrapper">
  <a href="#"><span>Записаться</span></a>
</div>
  
</div>
</form>
</body>
</html>
